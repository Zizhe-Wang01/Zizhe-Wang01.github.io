site_name: zosia的个人网站
site_description: zosia的个人网站
site_url: https://zizhe-wang01.github.io/

repo_name: Zizhe-Wang01/Zizhe-Wang01.github.io
repo_url: https://github.com/Zizhe-Wang01/Zizhe-Wang01.github.io
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - 首页: index.md
  - 算法和Agent:
      - 总览: ai/index.md
      - 强化学习: ai/reinforcement-learning.md
      - Agentic RL: ai/agenticrl.md
      - RLHF: ai/rlhf.md
  - 具身智能:
      - 总览: robotics/index.md
      - Isaac Sim: robotics/isaac-sim.md
  - 随笔:
      - 总览: notes/index.md
