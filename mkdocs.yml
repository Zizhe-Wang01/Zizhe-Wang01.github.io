site_name: Zosia's Notes
site_description: Zosia's Notes
site_url: https://zizhe-wang01.github.io/

repo_name: Zizhe-Wang01/Zizhe-Wang01.github.io
repo_url: https://github.com/Zizhe-Wang01/Zizhe-Wang01.github.io
edit_uri: edit/main/docs/

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: teal
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - 首页: index.md
  - 算法和 Agent:
      - ai/index.md
      - 强化学习系列:
          - ai/reinforcement-learning.md
          - "RL 01: Basic Concepts": ai/rl_01.md
          - RLHF: ai/rlhf.md
      - Agentic RL 系列:
          - ai/agenticrl.md
          - 总述: ai/agenticrloverview.md
          - "Agentic RL 01: Policy Gradient Loss": ai/agenticrl_01.md


  - 具身智能:
      - robotics/index.md
      - Isaac Sim: robotics/isaac-sim.md
  - 随笔:
      - notes/index.md
